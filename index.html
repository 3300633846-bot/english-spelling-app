<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7c5cff">
<title>每日英语逐字母语音拼写、防漏字、朗读与自主选词闯关</title>
<style>
  :root{
    --bg1:#fff7ed;--bg2:#eef8ff;--card:rgba(255,255,255,.88);--text:#172033;--muted:#687085;
    --primary:#7c5cff;--primary2:#5b42dc;--good:#14a46d;--warn:#f59e0b;--bad:#ef4444;
    --line:rgba(23,32,51,.10);--shadow:0 22px 55px rgba(39,52,99,.14);--radius:28px;
  }
  *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 8% 7%,rgba(255,197,89,.32),transparent 28rem),radial-gradient(circle at 88% 5%,rgba(124,92,255,.22),transparent 30rem),linear-gradient(135deg,var(--bg1),var(--bg2));}
  button,input,select{font:inherit}button{-webkit-tap-highlight-color:transparent;cursor:pointer}button:disabled{opacity:.5;cursor:not-allowed}
  .app{width:min(1160px,100%);margin:0 auto;padding:max(18px,env(safe-area-inset-top)) 18px max(28px,env(safe-area-inset-bottom))}
  header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#ffb84d,#7c5cff);display:grid;place-items:center;color:#fff;font-weight:1000;font-size:24px;box-shadow:0 13px 30px rgba(124,92,255,.25)}h1{font-size:clamp(23px,4vw,36px);margin:0;letter-spacing:-.04em}.sub{color:var(--muted);font-size:14px;margin-top:3px}.top-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid var(--line);background:rgba(255,255,255,.76);color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800}
  .layout{display:grid;grid-template-columns:350px 1fr;gap:18px;align-items:start}.panel,.study-card,.summary-card{background:var(--card);border:1px solid rgba(255,255,255,.76);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.panel{padding:18px;position:sticky;top:16px}.panel h2,.summary-card h2{font-size:18px;margin:0 0 14px}label{display:block;color:var(--muted);font-size:13px;font-weight:900;margin-bottom:7px}.field{margin-bottom:14px}select,input[type="number"],input[type="text"]{width:100%;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px 13px;outline:none;color:var(--text)}input:focus,select:focus{border-color:rgba(124,92,255,.45);box-shadow:0 0 0 4px rgba(124,92,255,.12)}
  .toggles{display:grid;gap:10px;margin:14px 0}.checkline{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.62);margin:0}.checkline span{font-weight:600;color:var(--muted);font-size:12px}.checkline input{width:22px;height:22px;accent-color:var(--primary)}.btn{border:0;border-radius:18px;padding:12px 16px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;transition:transform .08s ease,filter .15s ease}.btn:active{transform:scale(.98)}.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}.btn.good{background:#e9fbf3;color:#09734c}.btn.ghost{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.warn{background:#fff7e6;color:#a35f00;border:1px solid rgba(245,158,11,.25)}.btn.bad{background:#fff1f1;color:#b42323;border:1px solid rgba(239,68,68,.24)}.btn.row{width:100%;margin-top:10px}.tiny{font-size:12px;color:var(--muted);line-height:1.65}.footer-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0}.stat{background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:18px;padding:12px}.stat b{font-size:24px;display:block}.stat small{color:var(--muted);font-weight:800}.mode-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:8px 0 14px}.mode-tab{padding:11px 9px;border-radius:16px;background:#fff;border:1px solid var(--line);font-weight:900}.mode-tab.active{background:rgba(124,92,255,.11);border-color:rgba(124,92,255,.38);color:var(--primary2)}
  .main{display:grid;gap:18px}.study-card{min-height:610px;padding:22px;overflow:hidden;position:relative}.progress-wrap{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:18px}.bar{height:15px;border-radius:999px;background:rgba(23,32,51,.08);overflow:hidden}.bar>div{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#ffb84d,#7c5cff);transition:width .35s ease}.progress-text{font-size:13px;font-weight:1000;color:var(--muted)}
  .badge-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:1000;background:#fff;border:1px solid var(--line);color:var(--muted)}.badge.green{background:#e9fbf3;color:#08764d}.badge.orange{background:#fff7e6;color:#9a5c00}.badge.purple{background:#f1edff;color:#5b42dc}.badge.red{background:#fff1f1;color:#b42323}
  .center-screen{min-height:470px;display:grid;place-items:center;text-align:center}.start-box{max-width:720px}.start-title{font-size:clamp(31px,5vw,56px);font-weight:1000;letter-spacing:-.06em;line-height:1.02;margin:14px 0}.start-sub{font-size:17px;color:var(--muted);line-height:1.7;margin:0 auto 22px;max-width:680px}.start-btn{font-size:20px;min-width:min(420px,100%);min-height:64px;border-radius:24px}.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
  .prompt{font-size:17px;color:var(--muted);font-weight:900;text-align:center;margin-top:18px}.meaning{font-size:clamp(31px,6vw,58px);font-weight:1000;letter-spacing:-.04em;text-align:center;line-height:1.12;margin:20px auto 12px;max-width:760px}.big-word{font-size:clamp(40px,8vw,76px);font-weight:1000;text-align:center;line-height:1.08;margin:18px auto 12px;word-break:break-word}.listen-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:16px 0}.spell-panel{width:min(760px,100%);margin:0 auto}.letter-hint{min-height:58px;margin:12px 0;padding:14px;border:1px dashed rgba(124,92,255,.35);border-radius:20px;background:rgba(255,255,255,.62);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:clamp(20px,4vw,34px);letter-spacing:.08em;text-align:center;line-height:1.5;word-break:break-word;color:#3b345f}.hint-label{font-size:12px;color:var(--muted);font-weight:900;text-align:center;margin-top:4px}.spelling-box{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:14px}.spelling-box input{font-size:clamp(22px,4.5vw,36px);font-weight:900;text-align:center;letter-spacing:.03em;border-radius:22px;min-height:68px}.hint-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}.answer-reveal{display:none;margin-top:13px;padding:15px;border-radius:20px;background:#fff7e6;border:1px solid rgba(245,158,11,.30);text-align:center;font-size:18px;color:#7c4700;line-height:1.6}.answer-reveal.show{display:block}.answer-reveal b{font-size:clamp(28px,5vw,46px);display:block;color:#172033;word-break:break-word;margin:3px 0}.feedback{min-height:34px;text-align:center;font-weight:1000;margin-top:14px}
  .diff-box{width:min(760px,100%);margin:12px auto 0;padding:14px;border-radius:20px;background:rgba(255,255,255,.72);border:1px solid var(--line);font-size:14px;line-height:1.7;color:var(--muted)}.diff-box b{color:var(--text)}.diff-box .missing{color:var(--bad);font-weight:1000}.diff-box .ok{color:var(--good);font-weight:1000}.danger-box{width:min(760px,100%);margin:10px auto 0;padding:12px 14px;border-radius:18px;background:#fff7e6;border:1px solid rgba(245,158,11,.28);color:#7c4700;font-size:13px;font-weight:800;line-height:1.65}.miss-panel{width:min(760px,100%);margin:0 auto}.missing-word{min-height:70px;margin:14px auto 10px;padding:16px;border:2px dashed rgba(124,92,255,.38);border-radius:22px;background:rgba(255,255,255,.72);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:clamp(28px,6vw,52px);letter-spacing:.08em;text-align:center;line-height:1.4;word-break:break-word;color:#352d62}.no-spell-badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 9px;background:#fff1f1;color:#b42323;font-size:12px;font-weight:1000;border:1px solid rgba(239,68,68,.22)}.feedback.good{color:var(--good)}.feedback.bad{color:var(--bad)}.feedback.warn{color:#a35f00}.combo{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:1000;margin:10px 0 0;color:#5b42dc}.stars{font-size:26px;line-height:1;filter:drop-shadow(0 5px 8px rgba(245,158,11,.25))}.shake{animation:shake .22s linear 0s 2}.pop{animation:pop .24s ease-out}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}@keyframes pop{from{transform:scale(.985);opacity:.85}to{transform:scale(1);opacity:1}}

  .voice-spell-tip{width:min(720px,100%);margin:10px auto 0;padding:12px 14px;border-radius:18px;background:#f1edff;border:1px solid rgba(124,92,255,.24);color:#4b37b4;font-size:13px;font-weight:900;line-height:1.7;text-align:left}.voice-spell-tip b{color:#2b2352}.heard-letters{font-size:clamp(26px,5vw,46px);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.12em}.praise-pop{position:absolute;z-index:20;left:50%;top:46%;transform:translate(-50%,-50%);width:min(660px,90%);padding:20px 22px;border-radius:28px;background:rgba(255,255,255,.97);border:2px solid rgba(255,184,77,.45);box-shadow:0 24px 70px rgba(39,52,99,.22);text-align:center;animation:praisePopIn .35s ease-out both;pointer-events:auto;cursor:pointer;user-select:none}.praise-pop .emoji{font-size:42px;line-height:1}.praise-pop b{display:block;font-size:clamp(22px,4vw,38px);line-height:1.25;letter-spacing:-.03em;margin-top:6px}.praise-pop .tap-next{margin:13px auto 0;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;border-radius:999px;background:#f1edff;color:#5b42dc;font-size:13px;font-weight:1000;border:1px solid rgba(124,92,255,.22)}.praise-pop.big{border-color:rgba(124,92,255,.45)}.praise-pop.big .emoji{font-size:58px}.praise-pop.big b{font-size:clamp(26px,5vw,46px)}@keyframes praisePopIn{0%{opacity:0;transform:translate(-50%,-45%) scale(.86)}70%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  .voice-panel{width:min(760px,100%);margin:0 auto;text-align:center}.mic-box{margin:14px auto;padding:16px;border-radius:22px;background:rgba(255,255,255,.68);border:1px dashed rgba(124,92,255,.35);max-width:660px}.heard-text{font-size:clamp(22px,4.6vw,38px);font-weight:1000;letter-spacing:.02em;color:#3b345f;min-height:48px;display:grid;place-items:center}.voice-note{font-size:13px;color:var(--muted);font-weight:800;line-height:1.6}.mic-live{animation:pulseMic 1s ease-in-out infinite}@keyframes pulseMic{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}.voice-slots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px auto 8px;max-width:720px}.voice-slot{min-width:38px;height:46px;border-radius:14px;border:2px solid rgba(124,92,255,.25);background:rgba(255,255,255,.82);display:grid;place-items:center;font-weight:1000;font-size:24px;box-shadow:0 8px 18px rgba(39,52,99,.08)}.voice-slot.filled{border-color:rgba(20,164,109,.42);background:#ecfdf5;color:#0f7a51}.voice-slot.now{border-color:rgba(245,158,11,.65);box-shadow:0 0 0 5px rgba(245,158,11,.12)}.voice-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}.letter-pad{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px auto 0;max-width:720px;padding:10px;border-radius:18px;background:rgba(255,255,255,.58);border:1px solid rgba(23,32,51,.08)}.letter-pad button{min-width:34px;padding:8px 0;border-radius:12px;border:1px solid rgba(124,92,255,.20);background:#fff;color:#3b345f;font-weight:1000}.letter-pad button:active{transform:scale(.96)}.voice-progress-line{font-size:14px;font-weight:900;color:#4b37b4;line-height:1.6}.voice-fallback-title{font-size:13px;color:var(--muted);font-weight:900;text-align:center;margin-top:8px}
  .choices{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:760px;margin:18px auto 0}.choice{background:#fff;border:1px solid var(--line);color:var(--text);min-height:66px;font-size:18px;line-height:1.35}.choice.correct{background:#e9fbf3;border-color:rgba(20,164,109,.45);color:#08764d}.choice.wrong{background:#fff1f1;border-color:rgba(239,68,68,.45);color:#b42323}.summary-card{padding:18px}.word-list{display:grid;gap:9px;margin-top:12px}.word-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:11px 12px;border-radius:16px;background:rgba(255,255,255,.68);border:1px solid var(--line)}.word-row b{font-size:16px}.word-row small{display:block;color:var(--muted);margin-top:2px}.mini-actions{display:flex;gap:8px;align-items:center}.mini-btn{min-height:34px;padding:6px 10px;border-radius:999px;font-size:12px}.confetti{pointer-events:none;position:fixed;inset:0;overflow:hidden;z-index:9}.dot{position:absolute;width:10px;height:10px;border-radius:999px;animation:fall 900ms ease-out forwards}@keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(100vh) rotate(280deg);opacity:0}}
  .focus .panel,.focus .summary-card,.focus header{display:none}.focus .layout{display:block}.focus .study-card{min-height:calc(100vh - 50px)}

  .custom-picker{border:1px solid rgba(124,92,255,.20);background:rgba(124,92,255,.06);border-radius:20px;padding:12px;margin:12px 0 14px}
  .custom-note{font-size:12px;color:var(--muted);font-weight:800;line-height:1.55;margin-bottom:10px}
  .selector-toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
  .selector-toolbar .btn,.selector-actions .btn{width:100%}
  .searchline{display:grid;grid-template-columns:1fr auto;gap:10px;margin:14px 0}
  .word-select-list{display:grid;gap:8px;max-height:52vh;overflow:auto;padding:4px;border-radius:18px}
  .word-select-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;background:rgba(255,255,255,.76);border:1px solid var(--line);border-radius:16px;padding:10px 12px}
  .word-select-row input{width:22px;height:22px;accent-color:var(--primary)}
  .word-select-row b{font-size:15px}.word-select-row small{display:block;color:var(--muted);font-weight:800;margin-top:3px;font-size:12px}
  .selector-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.selector-actions.three{grid-template-columns:1fr 1fr 1fr}
  .selector-count{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}.selector-count .badge{font-size:12px}
  .custom-active{background:rgba(20,164,109,.11);border-color:rgba(20,164,109,.28)}
  @media(max-width:860px){header{align-items:flex-start}.layout{grid-template-columns:1fr}.panel{position:static}.study-card{min-height:600px}.top-actions{display:none}.quick-grid{grid-template-columns:1fr}.hint-actions{grid-template-columns:1fr}.spelling-box{grid-template-columns:1fr}.choices{grid-template-columns:1fr}.mode-tabs{grid-template-columns:1fr}.selector-toolbar,.selector-actions,.selector-actions.three,.searchline{grid-template-columns:1fr}.word-select-list{max-height:58vh}}
  @media(max-width:520px){.app{padding-left:12px;padding-right:12px}.study-card,.panel,.summary-card{border-radius:22px}.stats{grid-template-columns:repeat(2,1fr)}.footer-actions{grid-template-columns:1fr}.listen-row .btn,.hint-actions .btn{width:100%}}
</style>
</head>
<body>
<div class="app" id="appRoot">
  <header>
    <div class="brand"><div class="logo">✍️</div><div><h1>每日英语逐字母语音拼写、防漏字与朗读闯关</h1><div class="sub">重点：看汉语逐字母语音拼英文 · 防漏字 · 自主选词 · 更丰富的花样夸奖</div></div></div>
    <div class="top-actions"><button class="pill" id="quickSpeak">🔊 测试发音</button><button class="pill" id="focusModeBtn">🧘 专注模式</button></div>
  </header>
  <div class="layout">
    <aside class="panel" id="settingsPanel">
      <h2>家长设置</h2>
      <div class="field"><label>今天练习模式</label><div class="mode-tabs"><button class="mode-tab" data-set-mode="zhSpell">汉语语音拼英文</button><button class="mode-tab" data-set-mode="missing">防漏字拼写</button><button class="mode-tab" data-set-mode="missed">不会拼列表</button><button class="mode-tab" data-set-mode="spelling">拼写专项</button><button class="mode-tab" data-set-mode="mixed">全流程</button><button class="mode-tab" data-set-mode="meaning">认意思</button><button class="mode-tab" data-set-mode="voice">朗读检测</button></div></div>
      <div class="field"><label for="gradeSelect">选择年级</label><select id="gradeSelect"></select></div>
      <div class="field"><label for="groupSelect">选择册</label><select id="groupSelect"></select></div>
      <div class="field"><label for="unitSelect">选择 Unit</label><select id="unitSelect"></select></div>
      <div class="custom-picker" id="customPickerBox"><label>自主选择单词</label><div class="custom-note" id="customWordsNote">未选择自选词。可以按年级/册/Unit筛选后打开选词表。</div><div class="quick-grid"><button class="btn ghost" id="openWordSelector">打开选词表</button><button class="btn ghost" id="clearCustomWords">清空自选</button></div></div>
      <div class="field"><label for="newCount">每天新词数量</label><input id="newCount" type="number" min="1" max="30" step="1"></div>
      <div class="field"><label for="sessionSize">每天拼写题数</label><input id="sessionSize" type="number" min="5" max="50" step="1"></div>
      <div class="toggles">
        <label class="checkline"><div>自动读英文<br><span>进入拼写题后自动播放一次</span></div><input id="autoSpeak" type="checkbox"></label>
        <label class="checkline"><div>允许完整答案<br><span>不会时点一下显示完整单词，不惩罚</span></div><input id="allowReveal" type="checkbox"></label>
        <label class="checkline"><div>少干扰模式<br><span>隐藏底部复盘列表</span></div><input id="quietMode" type="checkbox"></label>
      </div>
      <button class="btn primary row" id="startSpellingSide">开始今日练习</button>
      <button class="btn ghost row" id="saveSettings">保存设置</button>
      <div class="stats" id="statsBox"></div>
      <p class="tiny">语音拼写规则：看汉语后，每次只读一个英文字母，系统逐格填入后判断。机器听错时可以退一格或点字母修正；点“显示完整单词”会自动记入不会拼列表并统计次数。语音功能需要浏览器允许麦克风。</p>
      <div class="footer-actions"><button class="btn ghost" id="exportProgress">导出进度</button><button class="btn warn" id="resetProgress">清空进度</button></div>
    </aside>
    <main class="main">
      <section class="study-card" id="studyCard"><div class="progress-wrap"><div class="bar"><div id="barFill"></div></div><div class="progress-text" id="progressText">0/0</div></div><div id="cardContent"></div></section>
      <section class="summary-card" id="summaryCard"><h2>今日拼写复盘</h2><div id="todaySummary" class="tiny">还没开始。完成一轮后，这里会显示今日拼写表现和需要复习的词。</div><div class="word-list" id="reviewList"></div></section>
    </main>
  </div>

<script>
(()=>{
  "use strict";

  const $ = (id)=>document.getElementById(id);
  const els = {
    root:$("appRoot"), gradeSelect:$("gradeSelect"), groupSelect:$("groupSelect"), unitSelect:$("unitSelect"), newCount:$("newCount"), sessionSize:$("sessionSize"),
    autoSpeak:$("autoSpeak"), allowReveal:$("allowReveal"), quietMode:$("quietMode"), saveSettings:$("saveSettings"), startSpellingSide:$("startSpellingSide"),
    customPickerBox:$("customPickerBox"), customWordsNote:$("customWordsNote"), openWordSelector:$("openWordSelector"), clearCustomWords:$("clearCustomWords"),
    statsBox:$("statsBox"), exportProgress:$("exportProgress"), resetProgress:$("resetProgress"), quickSpeak:$("quickSpeak"), focusModeBtn:$("focusModeBtn"),
    studyCard:$("studyCard"), cardContent:$("cardContent"), barFill:$("barFill"), progressText:$("progressText"), summaryCard:$("summaryCard"), todaySummary:$("todaySummary"), reviewList:$("reviewList"), confetti:$("confetti")
  };
  const clone = (obj)=>JSON.parse(JSON.stringify(obj));
  const defaultState = {settings:{grade:"全部",group:"全部",unit:"全部",dailyNew:8,sessionSize:12,mode:"zhSpell",autoSpeak:true,allowReveal:true,quietMode:false,useCustomWords:false,selectedWordIds:[]},progress:{},history:{},lastRunDate:null,totalStars:0,badges:{}};
  let state = loadState();

  function blankSession(){return {active:false,queue:[],startedQueueLength:0,done:0,correct:0,wrong:0,stars:0,combo:0,bestCombo:0,practicedIds:new Set(),spellIds:new Set(),meaningIds:new Set(),readIds:new Set(),voiceIds:new Set(),hintIds:new Set(),revealedIds:new Set(),milestonesShown:new Set(),current:null,locked:false};}
  let activeRecognizer=null;
  function loadState(){
    try{
      const raw=localStorage.getItem(STORAGE_KEY) || LEGACY_KEYS.map(k=>localStorage.getItem(k)).find(Boolean);
      if(!raw)return clone(defaultState);
      const data=JSON.parse(raw);
      const merged={...clone(defaultState),...data,settings:{...defaultState.settings,...(data.settings||{}),mode:(data.settings&&data.settings.mode)||"zhSpell"},progress:data.progress||{},history:data.history||{},badges:data.badges||{},totalStars:data.totalStars||0};
      if(!Array.isArray(merged.settings.selectedWordIds))merged.settings.selectedWordIds=[];
      merged.settings.selectedWordIds=merged.settings.selectedWordIds.map(String);
      merged.settings.useCustomWords=!!merged.settings.useCustomWords;
      return merged;
    }catch(e){return clone(defaultState)}
  }
  function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
  function todayStr(offset=0){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10)}
  function addDays(dateStr,days){const d=new Date(dateStr+"T00:00:00");d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}
  function uniq(arr){return Array.from(new Set(arr));}
  function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
  function escapeAttr(s){return escapeHtml(s);}
  function gradeRank(g){return {"三年级":3,"四年级":4,"五年级":5,"六年级":6}[String(g||"").trim()]||99;}
  function groupRank(g){const m=String(g||"").match(/[一二三四五六七八九十]+/);const map={一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10};return m?[...m[0]].reduce((n,ch)=>n+(map[ch]||0),0):99;}
  function unitRank(u){const m=String(u||"").match(/\d+/);return m?Number(m[0]):99;}
  function bookLabelByGroup(group){const sample=WORDS.find(w=>w.group===group);if(!sample)return group;const gr=sample.grade||"";const semester=(groupRank(group)%2===1)?"上册":"下册";return gr?`${gr}${semester}`:group;}
  function rangeLabel(){const inferred=state.settings.group!=="全部"?(WORDS.find(w=>w.group===state.settings.group)?.grade||state.settings.grade):state.settings.grade;const g=inferred||"全部";const b=state.settings.group==="全部"?"全部册":bookLabelByGroup(state.settings.group);const u=state.settings.unit||"全部";return `${g} · ${b} · ${u}`;}
  function baseSelectedWords(){return WORDS.filter(w=>(state.settings.grade==="全部"||w.grade===state.settings.grade)&&(state.settings.group==="全部"||w.group===state.settings.group)&&(state.settings.unit==="全部"||w.unit===state.settings.unit));}
  function customWordIds(){return new Set((state.settings.selectedWordIds||[]).map(String));}
  function customSelectedWords(){const ids=customWordIds();return WORDS.filter(w=>ids.has(String(w.id)));}
  function selectedWords(){const custom=customSelectedWords();return (state.settings.useCustomWords&&custom.length)?custom:baseSelectedWords();}
  function selectorScopeWords(){return baseSelectedWords();}
  function byId(id){return WORDS.find(w=>String(w.id)===String(id));}
  function normalizeEnglish(s){return String(s||"").toLowerCase().replace(/[’‘`]/g,"'").replace(/\.\.\./g," ").replace(/\s+/g," ").trim();}
  function compactEnglish(s){return normalizeEnglish(s).replace(/&/g,"and").replace(/[^a-z0-9]+/g,"");}
  function answerVariants(en){const clean=String(en).trim();let parts=[clean];if(clean.includes("=")){parts=clean.split("=").map(x=>x.trim()).filter(Boolean);parts.push(clean)}if(clean.includes("/")){parts.push(...clean.split("/").map(x=>x.trim()).filter(Boolean))}return uniq(parts);}
  function speechCompact(s){return compactEnglish(String(s||"").replace(/colour/ig,"color").replace(/grey/ig,"gray"));}
  function speechVariants(en){const base=answerVariants(en).map(v=>speechCompact(v));const text=speechCompact(speakTextFor({en}));const aliases={mr:["mr","mister"],mrs:["mrs","misses"],ms:["ms","miss"],ok:["ok","okay"],tshirt:["tshirt","teeshirt"]};const all=[...base,text];base.forEach(v=>{if(aliases[v])all.push(...aliases[v]);});return uniq(all.filter(Boolean));}
  function isSpeechCorrect(transcripts,en){const targets=speechVariants(en);return transcripts.some(t=>targets.includes(speechCompact(t)));}
  function spokenLetterMap(){return {
    a:["a","ay","ai","eh","hey","hay","eight"],
    b:["b","bee","be","bean","beat"],
    c:["c","see","sea","seat"],
    d:["d","dee","de","the"],
    e:["e","ee","eat","east","he"],
    f:["f","eff","ef","if"],
    g:["g","gee","jeep"],
    h:["h","aitch","eitch","etch","age","each"],
    i:["i","eye","ice","hi"],
    j:["j","jay"],
    k:["k","kay","okay"],
    l:["l","el","ell","elle","all","owl"],
    m:["m","em","am","them"],
    n:["n","en","in","and"],
    o:["o","oh","owe","zero","one"],
    p:["p","pee","pea","peace","piece"],
    q:["q","cue","queue","cute"],
    r:["r","are","our","or"],
    s:["s","ess","es","as","us","yes"],
    t:["t","tea","tee","to","too","two"],
    u:["u","you","yew"],
    v:["v","vee","we"],
    w:["w","doubleyou","doubleu","double","doubleyou"],
    x:["x","ex","acts","axe"],
    y:["y","why","wise"],
    z:["z","zee","zed"]};}
  const SPOKEN_TO_LETTER=(()=>{const out={};const m=spokenLetterMap();Object.keys(m).forEach(ch=>m[ch].forEach(v=>out[v]=ch));return out;})();
  const VOICE_SPELL_FILLERS=new Set(["letter","letters","capital","uppercase","lowercase","space","blank","then","dash","hyphen","comma","period","dot","point","next"]);
  const VOICE_CONFUSION_GROUPS=["bdp","mnw","uov","ei","aehi","ckq","gj","sz","rl","ft","xy"];
  function speechTokens(text){let s=String(text||"").toLowerCase()
    .replace(/double\s+(you|u)/g," w ")
    .replace(/&/g," and ")
    .replace(/[0-9]/g,m=>({0:"zero",1:"one",2:"two",3:"three",4:"four",5:"five",6:"six",7:"seven",8:"eight",9:"nine"}[m]||" "))
    .replace(/[^a-z]+/g," ").trim();
    return s?s.split(/\s+/).filter(Boolean):[];}
  function lettersFromSpeech(text){const tokens=speechTokens(text);let out="";for(let i=0;i<tokens.length;i++){let tok=tokens[i];if(VOICE_SPELL_FILLERS.has(tok))continue;if(tok==="double"&&i+1<tokens.length){const nxt=SPOKEN_TO_LETTER[tokens[i+1]]||(tokens[i+1].length===1?tokens[i+1]:"");if(nxt){out+=nxt+nxt;i++;continue;}}const ch=SPOKEN_TO_LETTER[tok]||(tok.length===1&&/[a-z]/.test(tok)?tok:"");if(ch)out+=ch;}return out;}
  function voiceSpellingCandidates(transcripts){const all=[];(transcripts||[]).forEach(t=>{const direct=compactEnglish(t);const letters=lettersFromSpeech(t);if(direct)all.push(direct);if(letters)all.push(letters);});return uniq(all.filter(Boolean));}
  function formatCandidateLetters(c){return c?c.toUpperCase().split("").join(" "):"";}
  function lettersEquivalentForVoice(a,b){if(a===b)return true;return VOICE_CONFUSION_GROUPS.some(g=>g.includes(a)&&g.includes(b));}
  function levenshtein(a,b){a=String(a||"");b=String(b||"");const dp=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));for(let i=0;i<=a.length;i++)dp[i][0]=i;for(let j=0;j<=b.length;j++)dp[0][j]=j;for(let i=1;i<=a.length;i++){for(let j=1;j<=b.length;j++){dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));}}return dp[a.length][b.length];}
  function voiceSimilarityScore(c,t){if(!c||!t)return 0;if(c===t)return 1;let same=0,eq=0;const n=Math.max(c.length,t.length);for(let i=0;i<Math.min(c.length,t.length);i++){if(c[i]===t[i])same++;if(lettersEquivalentForVoice(c[i],t[i]))eq++;}const edit=levenshtein(c,t);return Math.max(same/Math.max(1,t.length), eq/Math.max(1,n)-edit*.08);}

  function updateProgressBar(){const target=Math.max(1,Number(state.settings.sessionSize)||session.startedQueueLength||1);const pct=Math.min(100,Math.round((session.done/target)*100));els.barFill.style.width=pct+"%";els.progressText.textContent=`${Math.min(session.done,target)}/${target}`;}

  function renderDone(allDone=false){session.active=false;updateProgressBar();const attempts=session.correct+session.wrong;const accuracy=attempts?Math.round(session.correct/attempts*100):100;const practiced=session.practicedIds.size;const spelling=session.spellIds.size;const voice=session.voiceIds?session.voiceIds.size:0;const hint=session.hintIds.size;const reveal=session.revealedIds.size;let badgeText="";if(session.bestCombo>=5)badgeText+='<span class="badge purple">🔥 连对达人</span>';if(accuracy>=90&&attempts>=8)badgeText+='<span class="badge green">🎯 高正确率</span>';if(session.stars>=25)badgeText+='<span class="badge orange">⭐ 星星收集家</span>';els.cardContent.innerHTML=`<div class="center-screen"><div class="start-box"><div class="badge-row" style="justify-content:center"><span class="badge green">完成</span><span class="badge orange">本轮 ${session.stars} 星</span><span class="badge purple">正确率 ${accuracy}%</span>${badgeText}</div><div class="start-title">${allDone?"今天已经完成啦":"今日拼写闯关完成"}</div><p class="start-sub">本轮练习 <b>${practiced}</b> 个词，其中拼写/防漏字 <b>${spelling}</b> 个、朗读检测 <b>${voice}</b> 个；用了提示 ${hint} 个，查看完整答案 ${reveal} 个。点过答案和拼错的词已经自动进入“不会拼列表”。</p><div class="selector-actions three"><button class="btn primary start-btn" id="moreNewBtn">学习更多的新单词</button><button class="btn good start-btn" id="againBtn">再来一轮拼写</button><button class="btn ghost start-btn" data-set-mode="missed" data-action="startMode">练错词</button></div><div class="quick-grid"><button class="btn ghost" data-set-mode="zhSpell" data-action="startMode">继续语音拼英文</button><button class="btn ghost" data-set-mode="missing" data-action="startMode">防漏字</button><button class="btn ghost" data-set-mode="voice" data-action="startMode">朗读检测</button></div></div></div>`;$("againBtn").addEventListener("click",startSession);$("moreNewBtn").addEventListener("click",startMoreNewWords);renderReviewList();updateStats();maybeConfetti(28);}
  function renderStart(){updateProgressBar();updateCustomWordsNote();const chosen=selectedWords();const customActive=state.settings.useCustomWords&&customSelectedWords().length>0;const due=countDue(chosen);const weak=countWeak(chosen);const noSpell=chosen.filter(w=>{const p=existingProgress(w.id);return p&&((p.noSpell||0)>0||(p.spellWrong||0)>0)}).length;const todayNewLeft=Math.max(0,Number(state.settings.dailyNew)||8);const isVoice=state.settings.mode==="voice";const isMissing=state.settings.mode==="missing";const isZh=state.settings.mode==="zhSpell";let intro;if(customActive)intro=`已启用自主选词：本轮只从你勾选的 <b>${chosen.length}</b> 个单词里出题。可以用于听写前专项练习；错词仍会自动统计。`;else if(isVoice)intro=`今天会出现英文单词，孩子点麦克风后读出来；系统会根据识别到的英文判断是否读对。读错不会惩罚，可以听标准发音后再试。`;else if(isMissing)intro=`今天专练“漏字点”：系统会给出汉语和带缺口的英文，让孩子补字母。适合解决漏字、顺序不稳、b/d/p/q 等方向字母混乱。`;else if(isZh)intro=`今天只做“看汉语，用语音拼英文”。孩子按字母读出来，系统自动判断；不会时点“显示完整单词”，会自动记入不会拼列表，并统计错误次数。`;else intro=`今天系统会优先安排：待复习词 <b>${due}</b> 个、薄弱词 <b>${weak}</b> 个、不会拼词 <b>${noSpell}</b> 个、新词最多 <b>${todayNewLeft}</b> 个。`;els.cardContent.innerHTML=`<div class="center-screen"><div class="start-box"><div class="badge-row" style="justify-content:center"><span class="badge">${customActive?"自选词":escapeHtml(rangeLabel())}</span><span class="badge green">${chosen.length} 个词</span><span class="badge purple">${modeName(state.settings.mode)}</span><span class="no-spell-badge">不会拼 ${noSpell}</span></div><div class="start-title">${customActive?"只练自己选的词":isVoice?"打开就直接朗读":isMissing?"打开就防漏字":"打开就语音拼英文"}</div><p class="start-sub">${intro}</p><button class="btn primary start-btn" id="startMain">${isVoice?"开始今日朗读":isMissing?"开始防漏字拼写":"开始今日语音拼写"}</button><div class="quick-grid"><button class="btn ghost" data-action="openSelector">自主选择单词</button><button class="btn ghost" data-set-mode="zhSpell" data-action="startMode">语音拼英文</button><button class="btn ghost" data-set-mode="missing" data-action="startMode">防漏字</button><button class="btn ghost" data-set-mode="missed" data-action="startMode">不会拼列表</button></div></div></div>`;$("startMain").addEventListener("click",startSession);}
  function countDue(words){const today=todayStr();return words.filter(w=>{const p=existingProgress(w.id);return p&&(!p.due||p.due<=today)}).length;}
  function countWeak(words){return words.filter(w=>{const p=existingProgress(w.id);return p&&((p.spellWrong||p.wrong||0)>0 || (p.reveals||0)>0 || (p.noSpell||0)>0 || (p.missingWrong||0)>0 || (p.spellStage||0)<3)}).length;}
  function updateStats(){updateCustomWordsNote();const chosen=selectedWords();const spellingReady=chosen.filter(w=>(existingProgress(w.id)?.spellStage||0)>=5).length;const due=countDue(chosen);const weak=countWeak(chosen);const noSpell=chosen.filter(w=>{const p=existingProgress(w.id);return p&&((p.noSpell||0)>0||(p.spellWrong||0)>0)}).length;const missingWrong=chosen.reduce((sum,w)=>sum+(existingProgress(w.id)?.missingWrong||0),0);const streak=computeStreak();els.statsBox.innerHTML=`<div class="stat"><b>${chosen.length}</b><small>当前范围词数</small></div><div class="stat"><b>${noSpell}</b><small>不会拼词数</small></div><div class="stat"><b>${weak}</b><small>需加强拼写</small></div><div class="stat"><b>${missingWrong}</b><small>漏字练错次数</small></div><div class="stat"><b>${spellingReady}</b><small>拼写较稳</small></div><div class="stat"><b>${state.totalStars||0}</b><small>总星星</small></div>`;renderTodaySummary();}
  function accuracyToday(){const h=state.history[todayStr()];if(!h||!h.done)return 100;return Math.round((h.correct||0)/Math.max(1,h.correct+h.wrong)*100);}
  function computeStreak(){let streak=0;for(let i=0;i<365;i++){const d=todayStr(-i);if(state.history[d]&&state.history[d].done>0)streak++;else break;}return streak;}
  function renderTodaySummary(){const h=state.history[todayStr()];if(!h){els.todaySummary.innerHTML="还没开始。完成一轮后，这里会显示今日拼写表现、不会拼词和需要复习的词。";renderReviewList();return}const badgeNames=[];if(state.badges?.tenSpell)badgeNames.push("✍️ 今日拼写 10 题");if(state.badges?.perfectTen)badgeNames.push("🎯 十题高能");if(state.badges?.threeDays)badgeNames.push("🔥 连续 3 天");if(state.badges?.hundredStars)badgeNames.push("⭐ 100 星");els.todaySummary.innerHTML=`今天完成 <b>${h.done||0}</b> 题，语音拼写 <b>${h.modes?.zhSpell||0}</b> 次，普通拼写 <b>${h.modes?.spell||0}</b> 题，防漏字 <b>${h.modes?.missing||0}</b> 题，朗读 <b>${h.modes?.speakCheck||0}</b> 题，查看答案 <b>${h.reveals||0}</b> 次，正确率 <b>${accuracyToday()}%</b>。${badgeNames.length?"<br>徽章："+badgeNames.join(" · "):""}`;renderReviewList();}
  function renderReviewList(){if(state.settings.quietMode){els.summaryCard.style.display="none";return}else{els.summaryCard.style.display="block"}const chosen=selectedWords();const weak=chosen.filter(w=>{const p=existingProgress(w.id);return p&&((p.due||todayStr())<=todayStr() || (p.spellWrong||0)>0 || (p.reveals||0)>0 || (p.noSpell||0)>0 || (p.missingWrong||0)>0)}).sort((a,b)=>{const pa=existingProgress(a.id)||{},pb=existingProgress(b.id)||{};const sa=(pa.spellWrong||0)*3+(pa.noSpell||0)*4+(pa.reveals||0)*2+(pa.missingWrong||0)*2;const sb=(pb.spellWrong||0)*3+(pb.noSpell||0)*4+(pb.reveals||0)*2+(pb.missingWrong||0)*2;return sb-sa}).slice(0,16);if(!weak.length){els.reviewList.innerHTML='<div class="tiny">暂无不会拼词。孩子点过“显示完整单词”或拼错后，这里会自动出现，并统计次数。</div>';return}els.reviewList.innerHTML=weak.map(w=>{const p=existingProgress(w.id)||{};return `<div class="word-row"><div><b>${escapeHtml(w.en)}</b><small>${escapeHtml(w.zh)} · 拼写等级 ${p.spellStage||0} · 拼错 ${p.spellWrong||0} 次 · 语音拼错 ${p.voiceSpellWrong||0} 次 · 看答案/不会 ${p.noSpell||0} 次 · 漏字练错 ${p.missingWrong||0} 次</small></div><div class="mini-actions"><button class="btn ghost mini-btn" data-action="speakWord" data-word-id="${w.id}">🔊</button></div></div>`}).join("");}
  function exportProgress(){const data={exportedAt:new Date().toISOString(),settings:state.settings,progress:state.progress,history:state.history,totalStars:state.totalStars,badges:state.badges};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="英语拼写进度.json";a.click();URL.revokeObjectURL(url);}
  function resetProgress(){if(!confirm("确定清空本浏览器里的学习进度吗？词库不会删除。"))return;state=clone(defaultState);saveState();populateSelects();renderStart();updateStats();}
  function maybeConfetti(n=18){const colors=["#ffb84d","#7c5cff","#14a46d","#38bdf8","#f472b6"];for(let i=0;i<n;i++){const d=document.createElement("div");d.className="dot";d.style.left=Math.random()*100+"vw";d.style.top="-16px";d.style.background=colors[i%colors.length];d.style.animationDelay=(Math.random()*160)+"ms";els.confetti.appendChild(d);setTimeout(()=>d.remove(),1100);}}

  function bindEvents(){
    els.gradeSelect.addEventListener("change",()=>{state.settings.grade=els.gradeSelect.value;refreshGroupSelect();refreshUnitSelect();applySettingsFromUI();renderStart();});
    els.groupSelect.addEventListener("change",()=>{state.settings.group=els.groupSelect.value;refreshUnitSelect();applySettingsFromUI();renderStart();});
    els.unitSelect.addEventListener("change",()=>{state.settings.unit=els.unitSelect.value;applySettingsFromUI();renderStart();});
    [els.newCount,els.sessionSize,els.autoSpeak,els.allowReveal,els.quietMode].forEach(el=>el.addEventListener("change",()=>{applySettingsFromUI();renderStart();}));
    els.saveSettings.addEventListener("click",()=>{applySettingsFromUI();showToastOnCard("设置已保存，可以开始今日语音拼写。")});
    els.startSpellingSide.addEventListener("click",()=>{renderModeTabs();startSession();});
    els.openWordSelector.addEventListener("click",()=>renderWordSelector());
    els.clearCustomWords.addEventListener("click",clearCustomSelection);
    els.exportProgress.addEventListener("click",exportProgress);els.resetProgress.addEventListener("click",resetProgress);
    els.quickSpeak.addEventListener("click",()=>speak("apple, school, happy"));
    els.focusModeBtn.addEventListener("click",()=>{document.body.classList.toggle("focus");});
    document.addEventListener("click",e=>{const btn=e.target.closest("button");if(!btn)return;if(btn.dataset.setMode){state.settings.mode=btn.dataset.setMode;applySettingsFromUI();renderStart();if(btn.dataset.action==="startMode")startSession();return}const action=btn.dataset.action;if(!action)return;if(action==="openSelector")renderWordSelector();if(action==="selectorSearchClear")renderWordSelector("");if(action==="selectorSelectVisible")changeVisibleSelection(true);if(action==="selectorClearVisible")changeVisibleSelection(false);if(action==="selectorSelectWeak")selectWeakWords();if(action==="selectorSelectScope"){setCustomSelection(selectorScopeWords().map(w=>w.id),true);renderWordSelector($("selectorSearch")?.value||"");}if(action==="selectorClearAll"){clearCustomSelection();renderWordSelector($("selectorSearch")?.value||"");}if(action==="selectorDisable"){state.settings.useCustomWords=false;saveState();updateCustomWordsNote();renderWordSelector($("selectorSearch")?.value||"");}if(action==="selectorBack")renderStart();if(action==="selectorSaveOnly"){setCustomSelection(currentSelectorIds(),false);showToastOnCard("自选词已保存；需要时可打开选词表启用。") }if(action==="selectorUseStart"){setCustomSelection(currentSelectorIds(),true);state.settings.mode=state.settings.mode||"zhSpell";startSession();}if(action==="speak"&&session.current)speak(session.current.word);if(action==="startVoice")startVoiceCheck();if(action==="startVoiceSpell")startVoiceSpell();if(action==="startVoiceSpellFull")startVoiceSpellFull();if(action==="undoVoiceLetter")undoVoiceLetter();if(action==="clearVoiceLetters")clearVoiceLetters();if(action==="finishVoiceLetters")finishVoiceLetters();if(action==="manualVoiceLetter")manualVoiceLetter(btn.dataset.letter);if(action==="slowSpeak")slowSpeak();if(action==="checkSpell")checkSpelling();if(action==="checkMissing")checkMissing();if(action==="hint")showHint();if(action==="reveal")revealAnswer();if(action==="tryAgain")tryAgain();if(action==="skip")skipWord();if(action==="readDone")readDone();if(action==="speakWord"){const w=byId(btn.dataset.wordId);if(w)speak(w);} });
    document.addEventListener("click",e=>{const choice=e.target.closest(".choice");if(choice)chooseAnswer(choice);});
  }
  function showToastOnCard(text){if(!session.active){els.cardContent.insertAdjacentHTML("afterbegin",`<div class="feedback good" style="margin-bottom:10px">${escapeHtml(text)}</div>`);setTimeout(renderStart,900);} }
  function init(){populateSelects();bindEvents();renderStart();updateStats();saveState();}
  init();
})();
</script>
</body>
